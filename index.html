<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小馨日本代購</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: #f7f7f7; color: #222; }
  a { color: inherit; text-decoration: none; }

  /* Header */
  .header { background: #fff; border-bottom: 1px solid #eee; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-actions { display: flex; gap: 10px; }
  .btn-ghost { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  .btn-ghost:hover { background: #f5f5f5; }

  /* Cart badge */
  .cart-btn { position: relative; }
  .cart-count { position: absolute; top: -6px; right: -6px; background: #e84444; color: #fff; font-size: 10px; font-weight: 600; border-radius: 10px; padding: 1px 5px; display: none; }

  /* Page sections */
  .page { display: none; padding: 20px; max-width: 680px; margin: 0 auto; }
  .page.active { display: block; }

  /* Group list */
  .group-card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: box-shadow 0.15s; }
  .group-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .group-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .group-meta { font-size: 13px; color: #888; display: flex; gap: 14px; flex-wrap: wrap; }
  .status-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #e8f4e8; color: #2d7a2d; font-weight: 500; margin-top: 8px; }

  /* Product grid */
  .back-btn { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #666; margin-bottom: 16px; cursor: pointer; background: none; border: none; }
  .back-btn:hover { color: #222; }
  .group-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .group-subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .product-card { background: #fff; border-radius: 10px; border: 1px solid #eee; overflow: hidden; }
  .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 13px; }
  .product-img img { width: 100%; height: 100%; object-fit: cover; }
  .product-info { padding: 10px; }
  .product-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
  .product-price { font-size: 12px; color: #888; }
  .product-price span { color: #e84444; font-weight: 600; font-size: 14px; }
  .product-variant { margin-top: 8px; }
  .product-variant select { width: 100%; font-size: 12px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px; }
  .product-qty { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #ddd; background: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .qty-btn:hover { background: #f5f5f5; }
  .qty-num { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }
  .add-cart-btn { width: 100%; margin-top: 8px; padding: 7px; background: #222; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .add-cart-btn:hover { background: #444; }
  .add-cart-btn:disabled { background: #ccc; cursor: not-allowed; }
  .max-hint { font-size: 11px; color: #aaa; margin-top: 4px; }

  /* Cart */
  .cart-empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }
  .cart-item { background: #fff; border-radius: 10px; border: 1px solid #eee; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 500; }
  .cart-item-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .cart-item-price { font-size: 14px; font-weight: 600; color: #e84444; margin-top: 4px; }
  .cart-item-remove { color: #ccc; font-size: 18px; cursor: pointer; padding: 0 4px; }
  .cart-item-remove:hover { color: #e84444; }
  .cart-summary { background: #fff; border-radius: 10px; border: 1px solid #eee; padding: 16px; margin-top: 16px; }
  .summary-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; }
  .summary-row.total { font-weight: 700; font-size: 16px; border-top: 1px solid #eee; margin-top: 6px; padding-top: 10px; }
  .summary-note { font-size: 12px; color: #aaa; margin-top: 6px; }
  .checkout-btn { width: 100%; margin-top: 14px; padding: 14px; background: #222; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .checkout-btn:hover { background: #444; }

  /* Checkout form */
  .form-section { background: #fff; border-radius: 10px; border: 1px solid #eee; padding: 16px; margin-bottom: 14px; }
  .form-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #222; }
  .radio-group { display: flex; gap: 10px; }
  .radio-option { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; font-size: 13px; }
  .radio-option.selected { border-color: #222; background: #f5f5f5; font-weight: 500; }
  .submit-btn { width: 100%; padding: 14px; background: #222; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .submit-btn:hover { background: #444; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* Order confirm */
  .confirm-box { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 24px; text-align: center; }
  .confirm-icon { font-size: 48px; margin-bottom: 12px; }
  .confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .confirm-sub { font-size: 14px; color: #888; margin-bottom: 20px; }
  .confirm-detail { text-align: left; border-top: 1px solid #eee; padding-top: 16px; }
  .confirm-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; }
  .confirm-row.total { font-weight: 700; border-top: 1px solid #eee; margin-top: 6px; padding-top: 10px; }
  .confirm-note { font-size: 12px; color: #aaa; margin-top: 10px; text-align: center; }

  /* Query page */
  .query-box { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 20px; margin-bottom: 16px; }
  .query-box h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
  .query-input-row { display: flex; gap: 8px; }
  .query-input-row input { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .query-btn { padding: 10px 18px; background: #222; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .order-record { background: #fff; border-radius: 10px; border: 1px solid #eee; padding: 16px; margin-bottom: 12px; }
  .order-record-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-group-name { font-size: 15px; font-weight: 600; }
  .order-status { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #e8f4e8; color: #2d7a2d; }
  .order-items { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.8; }
  .order-amounts { border-top: 1px solid #f0f0f0; padding-top: 10px; }
  .order-amount-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: #666; }
  .order-amount-row.total { font-weight: 700; color: #222; font-size: 15px; }
  .paid-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 8px; }
  .paid-yes { background: #e8f4e8; color: #2d7a2d; }
  .paid-no { background: #fce8e8; color: #c0392b; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    .product-grid { grid-template-columns: repeat(2, 1fr); }
    .page { padding: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1 id="site-title" onclick="showPage('home')" style="cursor:pointer;">小馨日本代購</h1>
  <div class="header-actions">
    <button class="btn-ghost" onclick="showPage('home')">首頁</button>
    <button class="btn-ghost" onclick="showPage('query')">查詢訂單</button>
    <button class="btn-ghost cart-btn" onclick="showPage('cart')">
      購物車
      <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</div>

<!-- 團列表 -->
<div class="page active" id="page-home">
  <div id="group-rules-block" style="display:none;background:#fff;border-radius:12px;border:1px solid #eee;padding:16px;margin-bottom:16px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;">團購須知</div>
    <div id="group-rules-content" style="font-size:13px;color:#555;line-height:1.8;white-space:pre-wrap;"></div>
  </div>
  <div id="groups-list"><div class="loading">載入中...</div></div>
  <div id="group-progress" style="display:none;background:#fff;border-radius:12px;border:1px solid #eee;padding:16px;margin-top:16px;"></div>
</div>

<!-- 商品列表 -->
<div class="page" id="page-products">
  <button class="back-btn" onclick="showPage('home')">&#8592; 返回</button>
  <div class="group-title" id="product-group-name"></div>
  <div class="group-subtitle" id="product-group-meta"></div>
  <div class="product-grid" id="products-grid"></div>
</div>

<!-- 購物車 -->
<div class="page" id="page-cart">
  <button class="back-btn" onclick="goBack()">&#8592; 繼續購物</button>
  <div id="cart-content"></div>
</div>

<!-- 結帳表單 -->
<div class="page" id="page-checkout">
  <button class="back-btn" onclick="showPage('cart')">&#8592; 返回購物車</button>
  <div class="form-section">
    <div class="form-title">訂購人資料</div>
    <div class="form-group">
      <label>身分</label>
      <div class="radio-group">
        <div class="radio-option selected" id="opt-member" onclick="selectMember('member')">會員</div>
        <div class="radio-option" id="opt-nonmember" onclick="selectMember('nonmember')">非會員</div>
      </div>
    </div>
    <div class="form-group" id="member-group">
      <label>LINE ID</label>
      <input type="text" id="checkout-lineid" placeholder="請輸入你的 LINE ID">
    </div>
    <div class="form-group" id="nonmember-group" style="display:none;">
      <label>聯絡方式</label>
      <div style="display:flex;gap:8px;">
        <select id="checkout-contact-type" style="width:110px;padding:10px 8px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
          <option>臉書</option>
          <option>Threads</option>
          <option>Instagram</option>
          <option>其他</option>
        </select>
        <input type="text" id="checkout-contact-value" placeholder="帳號名稱或連結" style="flex:1;">
      </div>
    </div>
    <div class="form-group">
      <label>手機號碼 <span style="color:#e84444;font-size:12px;">必填</span></label>
      <input type="tel" id="checkout-phone" placeholder="09xxxxxxxx">
    </div>
  </div>
  <div class="form-section">
    <div class="form-title">訂單確認</div>
    <div id="checkout-summary"></div>
  </div>
  <button class="submit-btn" id="submit-btn" onclick="submitOrder()">確認下單</button>
</div>

<!-- 訂單完成 -->
<div class="page" id="page-confirm">
  <div class="confirm-box">
    <div class="confirm-icon">&#10003;</div>
    <div class="confirm-title">下單成功！</div>
    <div class="confirm-sub">已下單成功，以下為注意事項</div>
    <div class="confirm-detail" id="confirm-detail"></div>
    <div class="confirm-note" style="text-align:left;line-height:2;">
      1. 截團後將由小馨個別通知商品匯款金額與匯款帳號<br>
      2. 國際運費將與台灣運費一併收款，國際運費可經由查詢訂單查詢
    </div>
  </div>
  <button class="btn-ghost" style="width:100%;margin-top:16px;" onclick="showPage('home')">返回首頁</button>
</div>

<!-- 查詢訂單 -->
<div class="page" id="page-query">
  <div class="query-box">
    <h2>查詢我的訂單</h2>
    <div class="query-input-row">
      <input type="tel" id="query-phone" placeholder="輸入手機號碼">
      <button class="query-btn" onclick="queryOrders()">查詢</button>
    </div>
  </div>
  <div id="query-results"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 設定 =====
const API_URL = 'https://script.google.com/macros/s/AKfycby3L_MhTFDkFGt0HcBPfd83jfifmKZewNdXK2Sw5OQ8gcebwkIBWsTOSYEXOG7gylR1/exec'; // 部署後填入

// ===== 狀態 =====
let cart = [];
let currentGroup = null;
let currentGroupId = null;
let prevPage = 'home';
let deliveryType = '宅配';
let allGroups = [];

// ===== API =====
async function api(params) {
  try {
    const url = new URL(API_URL);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url);
    return await res.json();
  } catch(e) {
    return { error: '連線失敗' };
  }
}

async function apiPost(data) {
  try {
    // 用 form submit 方式繞過 CORS，透過隱藏 iframe 取得回應
    const url = new URL(API_URL);
    url.searchParams.set('action', data.action);
    url.searchParams.set('data', encodeURIComponent(JSON.stringify(data)));
    const res = await fetch(url.toString(), {
      method: 'GET',
      redirect: 'follow'
    });
    const text = await res.text();
    try {
      return JSON.parse(text);
    } catch(e) {
      // Apps Script 有時回傳 HTML，嘗試從中抽取 JSON
      const match = text.match(/\{.*\}/s);
      if (match) return JSON.parse(match[0]);
      return { error: '回應格式錯誤' };
    }
  } catch(e) {
    return { error: e.message };
  }
}

// ===== 頁面切換 =====
function showPage(name) {
  prevPage = document.querySelector('.page.active')?.id?.replace('page-','') || 'home';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'home') loadGroups();
  if (name === 'cart') renderCart();
  if (name === 'checkout') renderCheckout();
}

function goBack() {
  showPage(prevPage || 'home');
}

// ===== 首頁：團列表 =====
async function loadGroups() {
  const el = document.getElementById('groups-list');
  el.innerHTML = '<div class="loading">載入中...</div>';
  // 載入團購規則
  const rulesResult = await api({ action: 'getSetting', key: 'group_rules' });
  const rules = rulesResult?.value || '';
  const rulesBlock = document.getElementById('group-rules-block');
  if (rules && rules.trim()) {
    document.getElementById('group-rules-content').textContent = rules;
    rulesBlock.style.display = 'block';
  } else {
    rulesBlock.style.display = 'none';
  }
  const groups = await api({ action: 'getGroups' });
  allGroups = Array.isArray(groups) ? groups : [];
  if (!allGroups.length) {
    el.innerHTML = '<div class="loading">目前沒有開放中的團，請稍後再來</div>';
    return;
  }
  // 團列表
  el.innerHTML = allGroups.map(g => `
    <div class="group-card" onclick="openGroup('${g.group_id}')">
      <div class="group-name">${g.name}</div>
      <div class="group-meta">
        <span>截單：${g.deadline ? new Date(g.deadline).toLocaleDateString('zh-TW') : ''}</span>
      </div>
      <div class="status-badge">${g.status || '開團中'}</div>
    </div>
  `).join('');

  // 各團進度表
  const progressEl = document.getElementById('group-progress');
  if (allGroups.length) {
    const statusColors = {
      '開團中': '#e8f4e8;color:#2d7a2d',
      '已截止': '#f0f0f0;color:#888',
      '已下單': '#e8f0fb;color:#1a56b0',
      '官方發貨': '#fff3e0;color:#e65100',
      '已集貨': '#fff3e0;color:#e65100',
      '已到台灣': '#e8f4e8;color:#2d7a2d',
      '已通知發貨': '#e8f4e8;color:#1a7a2d'
    };
    progressEl.innerHTML = `
      <div style="font-size:15px;font-weight:600;margin-bottom:12px;">各團進度</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="background:#f7f7f7;">
            <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-weight:500;color:#666;">團名</th>
            <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-weight:500;color:#666;">截單日</th>
            <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-weight:500;color:#666;">目前進度</th>
          </tr>
        </thead>
        <tbody>
          ${allGroups.map(g => {
            const sc = statusColors[g.status] || '#f0f0f0;color:#888';
            const [bg, color] = sc.split(';');
            return \`<tr>
              <td style="padding:10px 12px;border-bottom:1px solid #f5f5f5;">\${g.name}</td>
              <td style="padding:10px 12px;border-bottom:1px solid #f5f5f5;color:#888;">\${g.deadline ? new Date(g.deadline).toLocaleDateString('zh-TW') : ''}</td>
              <td style="padding:10px 12px;border-bottom:1px solid #f5f5f5;">
                <span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;background:\${bg};\${color}">\${g.status || '開團中'}</span>
              </td>
            </tr>\`;
          }).join('')}
        </tbody>
      </table>
    `;
    progressEl.style.display = 'block';
  }
}

async function openGroup(groupId) {
  currentGroup = allGroups.find(g => g.group_id === groupId);
  currentGroupId = groupId;
  document.getElementById('product-group-name').textContent = currentGroup?.name || '';
  const dl = currentGroup?.deadline;
  const dlFormatted = dl ? new Date(dl).toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric'}) : '';
  document.getElementById('product-group-meta').textContent = `截單日：${dlFormatted}`;
  document.getElementById('products-grid').innerHTML = '<div class="loading">載入商品中...</div>';
  showPage('products');

  const products = await api({ action: 'getProducts', group_id: groupId });
  renderProducts(Array.isArray(products) ? products : []);
}

function renderProducts(products) {
  if (!products.length) {
    document.getElementById('products-grid').innerHTML = '<div class="loading">此團尚無商品</div>';
    return;
  }
  document.getElementById('products-grid').innerHTML = products.map(p => {
    const variants = p.variants ? p.variants.split(',').map(v => v.trim()).filter(Boolean) : [];
    const twd = parseFloat(p.price_jpy);
    return `
      <div class="product-card">
        <div class="product-img">
          ${p.image_url ? `<img src="${p.image_url}" onerror="this.parentElement.textContent='無圖片'">` : '無圖片'}
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          ${p.description ? `<div style="font-size:11px;color:#aaa;margin:3px 0;">${p.description}</div>` : ''}
          <div class="product-price">NT$<span>${twd.toLocaleString()}</span></div>
          ${variants.length ? `
            <div class="product-variant">
              <select id="variant-${p.product_id}">
                ${variants.map(v => `<option>${v}</option>`).join('')}
              </select>
            </div>` : ''}
          <div class="product-qty">
            <button class="qty-btn" onclick="changeQty('${p.product_id}', -1)">-</button>
            <span class="qty-num" id="qty-${p.product_id}">1</span>
            <button class="qty-btn" onclick="changeQty('${p.product_id}', 1)">+</button>
          </div>
          ${p.max_qty ? `<div class="max-hint">限購 ${p.max_qty} 件</div>` : ''}
          <button class="add-cart-btn" onclick="addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">加入購物車</button>
        </div>
      </div>
    `;
  }).join('');
}

function changeQty(productId, delta) {
  const el = document.getElementById('qty-' + productId);
  let qty = parseInt(el.textContent) + delta;
  if (qty < 1) qty = 1;
  el.textContent = qty;
}

function addToCart(product) {
  const qtyEl = document.getElementById('qty-' + product.product_id);
  const qty = parseInt(qtyEl?.textContent || 1);
  const variantEl = document.getElementById('variant-' + product.product_id);
  const variant = variantEl ? variantEl.value : '';
  const twd = parseFloat(product.price_jpy);
  const maxQty = parseInt(product.max_qty) || 999;

  const existIdx = cart.findIndex(i =>
    i.product_id === product.product_id && i.variant === variant && i.group_id === currentGroupId
  );
  if (existIdx >= 0) {
    const newQty = cart[existIdx].qty + qty;
    if (newQty > maxQty) { showToast(`此商品限購 ${maxQty} 件`); return; }
    cart[existIdx].qty = newQty;
  } else {
    if (qty > maxQty) { showToast(`此商品限購 ${maxQty} 件`); return; }
    cart.push({
      product_id: product.product_id,
      group_id: currentGroupId,
      name: product.name,
      variant,
      qty,
      price_jpy: parseFloat(product.price_jpy),
      price_twd: twd
    });
  }
  updateCartCount();
  showToast('已加入購物車');
  if (qtyEl) qtyEl.textContent = 1;
}

function updateCartCount() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const el = document.getElementById('cart-count');
  el.textContent = total;
  el.style.display = total > 0 ? 'block' : 'none';
}

// ===== 購物車 =====
function renderCart() {
  const el = document.getElementById('cart-content');
  if (!cart.length) {
    el.innerHTML = '<div class="cart-empty">購物車是空的</div>';
    return;
  }
  const subtotal = cart.reduce((s, i) => s + i.price_twd * i.qty, 0);

  el.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}${item.variant ? ' ／ ' + item.variant : ''}</div>
        <div class="cart-item-meta">數量：${item.qty}</div>
        <div class="cart-item-price">NT$${(item.price_twd * item.qty).toLocaleString()}</div>
      </div>
      <span class="cart-item-remove" onclick="removeFromCart(${idx})">&#10005;</span>
    </div>
  `).join('') + `
    <div class="cart-summary">
      <div class="summary-row"><span>商品小計</span><span>NT$${subtotal.toLocaleString()}</span></div>
      <div class="summary-row"><span>國際運費</span><span>到貨後追加</span></div>
      <div class="summary-row total"><span>合計</span><span>NT$${subtotal.toLocaleString()}</span></div>
      <div class="summary-note">國際運費將於貨物到台灣後由小馨通知</div>
    </div>
    <button class="checkout-btn" onclick="showPage('checkout')">前往結帳</button>
  `;
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartCount();
  renderCart();
}

// ===== 結帳 =====
let memberType = 'member';

function selectMember(type) {
  memberType = type;
  document.getElementById('opt-member').classList.toggle('selected', type === 'member');
  document.getElementById('opt-nonmember').classList.toggle('selected', type === 'nonmember');
  document.getElementById('member-group').style.display = type === 'member' ? '' : 'none';
  document.getElementById('nonmember-group').style.display = type === 'nonmember' ? '' : 'none';
}

function renderCheckout() {
  const subtotal = cart.reduce((s, i) => s + i.price_twd * i.qty, 0);
  const domestic = deliveryType === '宅配' ? 100 : 0;
  document.getElementById('checkout-summary').innerHTML = `
    ${cart.map(i => `
      <div class="summary-row">
        <span>${i.name}${i.variant ? ' / '+i.variant : ''} x${i.qty}</span>
        <span>NT$${(i.price_twd * i.qty).toLocaleString()}</span>
      </div>
    `).join('')}
    <div class="summary-row"><span>國際運費</span><span>待追加</span></div>
    <div class="summary-row total"><span>目前合計</span><span>NT$${subtotal.toLocaleString()}</span></div>
  `;
}

async function submitOrder() {
  const phone = document.getElementById('checkout-phone').value.trim();
  if (!phone || !/^09\d{8}$/.test(phone)) { showToast('請填寫正確手機號碼'); return; }

  let contactInfo = '';
  if (memberType === 'member') {
    const lineId = document.getElementById('checkout-lineid').value.trim();
    if (!lineId) { showToast('請填寫 LINE ID'); return; }
    contactInfo = 'LINE ID: ' + lineId;
  } else {
    const contactType = document.getElementById('checkout-contact-type').value;
    const contactValue = document.getElementById('checkout-contact-value').value.trim();
    if (!contactValue) { showToast('請填寫聯絡方式'); return; }
    contactInfo = contactType + ': ' + contactValue;
  }

  if (!cart.length) { showToast('購物車是空的'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中...';

  const groupId = cart[0].group_id;
  const result = await apiPost({
    action: 'submitOrder',
    group_id: groupId,
    name: contactInfo,
    phone,
    delivery_type: memberType === 'member' ? '會員' : '非會員',
    address: contactInfo,
    items: cart.map(i => ({
      product_id: i.product_id,
      name: i.name,
      variant: i.variant,
      qty: i.qty,
      price_jpy: i.price_jpy
    }))
  });

  btn.disabled = false;
  btn.textContent = '確認下單';

  if (result.error) { showToast(result.error); return; }

  document.getElementById('confirm-detail').innerHTML = `
    <div class="confirm-row"><span>聯絡方式</span><span>${contactInfo}</span></div>
    <div class="confirm-row"><span>手機</span><span>${phone}</span></div>
    <div class="confirm-row"><span>商品金額</span><span>NT$${result.subtotal_twd.toLocaleString()}</span></div>
    <div class="confirm-row total"><span>目前合計</span><span>NT$${result.subtotal_twd.toLocaleString()}</span></div>
  `;
  cart = [];
  updateCartCount();
  showPage('confirm');
}

// ===== 查詢訂單 =====
async function queryOrders() {
  let phone = document.getElementById('query-phone').value.trim();
  if (!phone) { showToast('請輸入手機號碼'); return; }
  // 自動補0，無論輸入 0910007215 或 910007215 都能查到
  if (phone.length === 9 && !phone.startsWith('0')) phone = '0' + phone;
  const el = document.getElementById('query-results');
  el.innerHTML = '<div class="loading">查詢中...</div>';
  const orders = await api({ action: 'queryOrders', phone });
  if (!Array.isArray(orders) || !orders.length) {
    el.innerHTML = '<div class="loading">查無訂單記錄</div>';
    return;
  }
  el.innerHTML = orders.map(o => {
    const items = JSON.parse(o.items_json || '[]');
    const itemsText = items.map(i => `${i.name}${i.variant ? ' / '+i.variant : ''} x${i.qty}`).join('<br>');
    const intl = parseFloat(o.intl_fee_share) || 0;
    return `
      <div class="order-record">
        <div class="order-record-head">
          <div class="order-group-name">${o.group_name || '未知團'}</div>
          <div class="order-status">${o.group_status || '處理中'}</div>
        </div>
        <div class="order-items">${itemsText}</div>
        <div class="order-amounts">
          <div class="order-amount-row"><span>商品金額</span><span>NT$${parseFloat(o.subtotal_twd).toLocaleString()}</span></div>
          <div class="order-amount-row"><span>國際運費</span><span>${intl ? 'NT$'+intl.toLocaleString() : '待追加'}</span></div>
          <div class="order-amount-row total"><span>應付金額</span><span>NT$${parseFloat(o.total_twd).toLocaleString()}</span></div>
        </div>
        <span class="paid-badge ${o.paid == 'TRUE' || o.paid === true ? 'paid-yes' : 'paid-no'}">
          ${o.paid == 'TRUE' || o.paid === true ? '已付款' : '未付款'}
        </span>
      </div>
    `;
  }).join('');
}

// ===== 工具 =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== 初始化 =====
loadGroups();
</script>
